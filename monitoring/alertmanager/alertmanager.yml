# =============================================================
# Alertmanager Configuration — OmniNode
# =============================================================

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'discord'

  routes:
    - match:
        severity: critical
      receiver: 'discord'
      group_wait: 5s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'discord'
      repeat_interval: 6h

receivers:
  - name: 'discord'
    webhook_configs:
      - url: 'https://discord.com/api/webhooks/placeholder/placeholder'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
