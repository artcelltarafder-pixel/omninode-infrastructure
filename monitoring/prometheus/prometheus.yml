global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'omninode'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'bitcoin'
    static_configs:
      - targets: ['bitcoin-exporter:9332']

  - job_name: 'ethereum'
    static_configs:
      - targets: ['ethereum:6060']
    metrics_path: /debug/metrics/prometheus

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
