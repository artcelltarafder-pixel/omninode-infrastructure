# =============================================================
# OmniNode — Ansible Inventory
# Replace the IP with your actual server IP after Terraform apply
# =============================================================

[omninode]
omninode-node ansible_host=YOUR_SERVER_IP ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[omninode:vars]
ansible_python_interpreter=/usr/bin/python3
