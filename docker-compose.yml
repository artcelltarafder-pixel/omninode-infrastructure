version: '3.8'

services:

  bitcoin:
    image: lncm/bitcoind:v25.0
    container_name: omninode-bitcoin
    restart: unless-stopped
    volumes:
      - ./docker/bitcoin/data:/data/.bitcoin
      - ./docker/bitcoin/bitcoin.conf:/data/.bitcoin/bitcoin.conf:ro
    ports:
      - "${BTC_RPC_PORT}:8332"
      - "${BTC_P2P_PORT}:8333"
    environment:
      - BITCOIN_DATA=/data/.bitcoin
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-rpcuser=${BTC_RPC_USER}", "-rpcpassword=${BTC_RPC_PASS}", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - omninode

  ethereum:
    image: ethereum/client-go:stable
    container_name: omninode-ethereum
    restart: unless-stopped
    volumes:
      - ./docker/ethereum/data:/data
    ports:
      - "${ETH_HTTP_PORT}:8545"
      - "${ETH_WS_PORT}:8546"
      - "${ETH_P2P_PORT}:30303"
      - "${ETH_METRICS_PORT}:6060"
    command: >
      --datadir /data
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.api eth,net,web3,txpool
      --ws
      --ws.addr 0.0.0.0
      --ws.port 8546
      --ws.api eth,net,web3,txpool
      --metrics
      --metrics.addr 0.0.0.0
      --metrics.port 6060
      --sepolia
      --syncmode snap
      --maxpeers 25
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - omninode

  prometheus:
    image: prom/prometheus:latest
    container_name: omninode-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - omninode

  grafana:
    image: grafana/grafana:latest
    container_name: omninode-grafana
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    networks:
      - omninode

  alertmanager:
    image: prom/alertmanager:latest
    container_name: omninode-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT}:9093"
    networks:
      - omninode

networks:
  omninode:
    driver: bridge
